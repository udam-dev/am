<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Google Sans", sans-serif; font-style: normal; padding: 50px;}
        h1 { font-family: "Google Sans", sans-serif; font-style: normal; text-align: center; color: #333; }
        table { font-family: "Google Sans", sans-serif; font-style: normal; width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { font-family: "Google Sans", sans-serif; font-style: normal; border: 1px solid black; padding: 8px; text-align: center; }
        th { font-family: "Google Sans", sans-serif; font-style: normal; background-color: #f2f2f2; }
        .present { color: green; }
        .leave { color: orange; }
        .absent { color: red; }
    </style>
</head>
<body>
    <h1>{{ title }}</h1>
    <table>
        <thead>
            <tr>
                <th>ល.រ</th>
                <th>ឈ្មោះសិស្ស</th>
                <th>ស្ថានភាព</th>
            </tr>
        </thead>
        <tbody>
            {% for item in data %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ item.name }}</td>
                <td class="{{ 'present' if item.status == 'វត្តមាន' else 'leave' if item.status == 'សុំច្បាប់' else 'absent' }}">{{ item.status }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
